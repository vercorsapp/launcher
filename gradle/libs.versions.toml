[versions]
kotlin = "1.9.23"               # https://kotlinlang.org/docs/home.html
serialization = "1.6.3"         # https://github.com/Kotlin/kotlinx.serialization/releases
coroutines = "1.8.0"            # https://github.com/Kotlin/kotlinx.coroutines/releases
compose = "1.6.1"               # https://github.com/JetBrains/compose-multiplatform/releases
ktor = "2.3.9"                  # https://github.com/ktorio/ktor/releases
decompose = "3.0.0-alpha09"     # https://github.com/arkivanov/Decompose/releases
essenty = "2.0.0-alpha07"       # https://github.com/arkivanov/Essenty/releases
compose-icons = "1.1.0"         # https://github.com/DevSrSouza/compose-icons/releases
appdirs = "1.2.0"               # https://github.com/Syer10/Kotlin-Multiplatform-AppDirs/releases
prettytime = "5.0.7.Final"      # https://github.com/ocpsoft/prettytime/tags
kotlin-logging = "6.0.3"        # https://github.com/oshai/kotlin-logging/releases
logback = "1.3.14"              # https://github.com/qos-ch/logback/tags
jsystemthemedetector = "3.6"    # https://github.com/Dansoftowner/jSystemThemeDetector/releases
reveal = "3.0.5"                # https://github.com/svenjacobs/reveal/releases
coil = "3.0.0-alpha06"          # https://github.com/coil-kt/coil/releases
rebugger = "1.0.0-rc02"         # https://github.com/theapache64/rebugger/releases
mpfilepicker = "3.1.0"          # https://github.com/Wavesonics/compose-multiplatform-file-picker/releases
jna = "5.14.0"                  # https://github.com/java-native-access/jna/tags
oshi = "6.5.0"                  # https://github.com/oshi/oshi/releases
junit = "5.10.2"                # https://github.com/junit-team/junit5/releases
mockk = "1.13.10"               # https://github.com/mockk/mockk/releases
mockposable = "0.7"             # https://central.sonatype.com/artifact/com.jeppeman.mockposable/mockposable-gradle
sonarqube = "4.4.1.3373"        # https://github.com/SonarSource/sonar-scanner-gradle/releases

[libraries]
serialization-json = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "serialization" }
coroutines-swing = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-swing", version.ref = "coroutines" }
coroutines-test = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-test", version.ref = "coroutines" }
ktor-client-core = { group = "io.ktor", name = "ktor-client-core", version.ref = "ktor" }
ktor-client-cio = { group = "io.ktor", name = "ktor-client-cio", version.ref = "ktor" }
ktor-client-content-negotiation = { group = "io.ktor", name = "ktor-client-content-negotiation", version.ref = "ktor" }
ktor-client-logging = { group = "io.ktor", name = "ktor-client-logging", version.ref = "ktor" }
ktor-serialization-kotlinx-json = { group = "io.ktor", name = "ktor-serialization-kotlinx-json", version.ref = "ktor" }
ktor-server-core = { group = "io.ktor", name = "ktor-server-core", version.ref = "ktor" }
ktor-server-cio = { group = "io.ktor", name = "ktor-server-cio", version.ref = "ktor" }
decompose = { group = "com.arkivanov.decompose", name = "decompose", version.ref = "decompose" }
decompose-extensions-compose = { group = "com.arkivanov.decompose", name = "extensions-compose", version.ref = "decompose" }
essenty-lifecycle-coroutines = { group = "com.arkivanov.essenty", name = "lifecycle-coroutines", version.ref = "essenty" }
compose-icons-feather = { group = "br.com.devsrsouza.compose.icons", name = "feather", version.ref = "compose-icons" }
appdirs = { group = "ca.gosyer", name = "kotlin-multiplatform-appdirs", version.ref = "appdirs" }
prettytime = { group = "org.ocpsoft.prettytime", name = "prettytime", version.ref = "prettytime" }
kotlin-logging-jvm = { group = "io.github.oshai", name = "kotlin-logging-jvm", version.ref = "kotlin-logging" }
logback = { group = "ch.qos.logback", name = "logback-classic", version.ref = "logback" }
jsystemthemedetector = { group = "com.github.dansoftowner", name = "jsystemthemedetector", version.ref = "jsystemthemedetector" }
reveal = { group = "com.svenjacobs.reveal", name = "reveal-core", version.ref = "reveal" }
coil = { group = "io.coil-kt.coil3", name = "coil", version.ref = "coil" }
coil-compose = { group = "io.coil-kt.coil3", name = "coil-compose", version.ref = "coil" }
coil-network-ktor = { group = "io.coil-kt.coil3", name = "coil-network-ktor", version.ref = "coil" }
rebugger = { group = "io.github.theapache64", name = "rebugger", version.ref = "rebugger" }
mpfilepicker = { group = "com.darkrockstudios", name = "mpfilepicker", version.ref = "mpfilepicker" }
jna = { group = "net.java.dev.jna", name = "jna", version.ref = "jna" }
oshi = { group = "com.github.oshi", name = "oshi-core", version.ref = "oshi" }
junit = { group = "org.junit.jupiter", name = "junit-jupiter", version.ref = "junit" }
mockk = { group = "io.mockk", name = "mockk", version.ref = "mockk" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
jetbrains-compose = { id = "org.jetbrains.compose", version.ref = "compose" }
mockposable = { id = "com.jeppeman.mockposable", version.ref = "mockposable" }
sonarqube = { id = "org.sonarqube", version.ref = "sonarqube" }